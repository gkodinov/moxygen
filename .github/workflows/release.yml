name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - id: version
        name: Verify package version matches tag
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          node -e '
            const pkg = require("./package.json");
            const expected = process.argv[1];
            if (pkg.version !== expected) {
              console.error(`package.json version ${pkg.version} does not match tag ${expected}`);
              process.exit(1);
            }
          ' "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Pack npm artifact
        run: |
          mkdir -p .stage/release
          npm pack --pack-destination .stage/release

      - uses: actions/upload-artifact@v7
        with:
          name: moxygen-npm-package
          path: .stage/release/moxygen-*.tgz

  github-release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: moxygen-npm-package
          path: .stage/release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: .stage/release/moxygen-*.tgz

  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - uses: actions/download-artifact@v8
        with:
          name: moxygen-npm-package
          path: .stage/release

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -eu
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required to publish to npm" >&2
            exit 1
          fi
          if npm view "moxygen@${VERSION}" version >/dev/null 2>&1; then
            echo "moxygen@${VERSION} already exists on npm; skipping publish"
            exit 0
          fi
          npm publish ".stage/release/moxygen-${VERSION}.tgz" --provenance --access public
